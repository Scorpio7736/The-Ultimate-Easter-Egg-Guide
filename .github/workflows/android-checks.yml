name: Android Repository Checks

on:
  pull_request:
    branches:
      - main

  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    name: Build succeeds
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Make Gradle executable
        run: chmod +x gradlew

      - name: Build project
        run: ./gradlew clean build

  testing-disabled:
    name: ENABLE_TESTING is false
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Check ENABLE_TESTING
        shell: python
        run: |
          from pathlib import Path
          import re
          import sys

          files = list(Path(".").rglob("PageController_BaseClass.java"))

          if not files:
              print(
                  "::error::PageController_BaseClass.java could not be found."
              )
              sys.exit(1)

          if len(files) > 1:
              print(
                  "::error::Multiple PageController_BaseClass.java files were found."
              )

              for file in files:
                  print(f"Found: {file}")

              sys.exit(1)

          file = files[0]
          source = file.read_text(encoding="utf-8")

          false_declaration = re.compile(
              r"(?m)^[ \t]*"
              r"(?:(?:public|protected|private|static|final)\s+)*"
              r"boolean\s+ENABLE_TESTING\s*=\s*false\s*;"
              r"[ \t]*(?://.*)?$"
          )

          if not false_declaration.search(source):
              print(
                  f"::error file={file}::"
                  "ENABLE_TESTING must be declared as false."
              )
              sys.exit(1)

          print(f"Passed: ENABLE_TESTING is false in {file}")